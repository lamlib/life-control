name: Triển khai dự án NestJs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.6"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Package artifact (dist + node_modules)
        run: |
          mkdir -p backend-artifact
          cp -r dist backend-artifact/
          cp -r node_modules backend-artifact/
          cp package.json backend-artifact/
          cp package-lock.json backend-artifact/
          tar -czf backend.tar.gz backend-artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: .

      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          # Backup code cũ
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST 'mkdir -p /var/www/backups && cp -r /var/www/backend /var/www/backups/backend_$(date +%s) 2>/dev/null || true'

          # Tạo file .env tạm thời
          echo "$DEPLOY_ENV" > .env.production
          
          # Upload artifact và .env
          scp -i ~/.ssh/deploy_key backend.tar.gz $DEPLOY_USER@$DEPLOY_HOST:/var/www/
          scp -i ~/.ssh/deploy_key .env.production $DEPLOY_USER@$DEPLOY_HOST:/var/www/

          # Giải nén và reload
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST <<-'ENDSSH'
          cd /var/www
          rm -rf backend
          mkdir backend
          tar -xzf backend.tar.gz -C backend --strip-components=1
          mv /var/www/.env.production /var/www/backend/.env
          cd /var/www/backend
          export NODE_ENV=production
          pm2 reload backend-app || pm2 start npm --name backend-app -i max -- run start:prod
          ENDSSH

      - name: Notify deployment
        if: success()
        run: echo "Deploy thành công!"

      - name: Notify failure
        if: failure()
        run: echo "Deploy thất bại!"
