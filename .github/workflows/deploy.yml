name: Triển khai dự án NestJs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.6"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Package artifact (dist + node_modules)
        run: |
          mkdir -p life-control-artifact
          cp -r dist life-control-artifact/
          cp -r node_modules life-control-artifact/
          cp package.json life-control-artifact/
          cp package-lock.json life-control-artifact/
          tar -czf life-control.tar.gz life-control-artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: life-control-build
          path: life-control.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: life-control-build
          path: .

      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          # Backup code cũ
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST 'mkdir -p /var/www/backups && cp -r /var/www/life-control /var/www/backups/life-control_$(date +%s) 2>/dev/null || true'

          # Tạo file .env tạm thời
          echo "$DEPLOY_ENV" > .env.production
          
          # Upload artifact và .env
          scp -i ~/.ssh/deploy_key life-control.tar.gz $DEPLOY_USER@$DEPLOY_HOST:/var/www/
          scp -i ~/.ssh/deploy_key .env.production $DEPLOY_USER@$DEPLOY_HOST:/var/www/

          # Deploy với zero-downtime
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST <<-'ENDSSH'
          set -e  # Exit on error
          cd /var/www
          
          # Giải nén vào thư mục mới (tránh xóa thư mục đang chạy)
          rm -rf life-control-new
          mkdir life-control-new
          tar -xzf life-control.tar.gz -C life-control-new --strip-components=1
          
          # Copy .env vào thư mục mới
          cp .env.production life-control-new/.env.production
          
          # Atomic swap: đổi tên thư mục cũ và mới
          if [ -d "life-control" ]; then
            mv life-control life-control-old
          fi
          mv life-control-new life-control
          
          # Reload PM2 (zero downtime)
          cd /var/www/life-control
          export NODE_ENV=production
          # Prefer the canonical process name going forward.
          if pm2 describe life-control-app >/dev/null 2>&1; then
            pm2 reload life-control-app --update-env
          elif pm2 describe backend-app >/dev/null 2>&1; then
            # One-time migration from legacy naming: rename in-place (avoid two listeners).
            if ! pm2 restart backend-app --name life-control-app --update-env; then
              pm2 delete backend-app || true
              pm2 start npm --name life-control-app -i max -- run start:prod
            fi
          else
            pm2 start npm --name life-control-app -i max -- run start:prod
          fi
          
          # Đợi app khởi động
          sleep 3
          
          # Verify app đang chạy
          echo "=== PM2 Status ==="
          pm2 status
          
          # Kiểm tra logs
          echo "=== Recent Logs ==="
          pm2 logs life-control-app --nostream --lines 10
          
          # Cleanup thư mục cũ
          cd /var/www
          rm -rf life-control-old
          # Remove legacy deploy directory if it still exists (now canonical is /var/www/life-control)
          rm -rf backend backend-old backend-new 2>/dev/null || true
          
          echo "Deploy completed successfully!"
          ENDSSH

      - name: Notify deployment
        if: success()
        run: echo "Deploy thành công!"

      - name: Notify failure
        if: failure()
        run: echo "Deploy thất bại!"
